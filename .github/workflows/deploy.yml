# This is a basic workflow to help you get started with Actions

name: Deploy

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "feature/deploy-test" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build application with Gradle
        run: ./gradlew clean build

      - name: Build Docker image
        run: docker build -t innergrim-service-api:latest -f .docker/Dockerfile .
          
      - name: Save Docker image to a tar file
        run: docker save innergrim-service-api:latest > innergrim-service-api.tar

      - name: Upload Docker image tar as an artifact
        uses: actions/upload-artifact@v3
        with:
          name: docker-image
          path: innergrim-service-api.tar

      - name: Deploy to EC2
        run: |
          SCP_LOG="scp.log"
          SSH_LOG="ssh.log"
      
          # Save the SSH key to a temporary file
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
      
          echo "Transferring file to EC2..."
          scp -o StrictHostKeyChecking=no -i /tmp/id_rsa innergrim-service-api.tar ec2-user@3.39.72.21:/home/ec2-user > $SCP_LOG 2>&1
          if [ $? -ne 0 ]; then
          echo "SCP failed. Check $SCP_LOG for details."
          cat $SCP_LOG
          exit 1
          fi
      
          echo "Running commands on EC2..."
          ssh -o StrictHostKeyChecking=no -i /tmp/id_rsa ec2-user@3.39.72.21 << 'EOF' > $SSH_LOG 2>&1
          docker load < /home/ec2-user/innergrim-service-api.tar
          docker stop innergrim-service-api || true
          docker rm innergrim-service-api || true
          docker run -d --name innergrim-service-api -p 80:8080 innergrim-service-api:latest
          EOF
      
          if [ $? -ne 0 ]; then
          echo "SSH commands failed. Check $SSH_LOG for details."
          cat $SSH_LOG
          exit 1
          fi